<!DOCTYPE html>
<html>
<head>
<title>Signup - ZeroFis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#040706;
    color:#eafff7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    width:350px;
    padding:30px;
    background:#0b0f0d;
    border-radius:16px;
    box-shadow:0 0 40px #00ff9c11;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:26px;
    font-weight:700;
    color:#00ff9c;
    margin-bottom:10px;
}

.subtitle{
    color:#aaa;
    font-size:14px;
    margin-bottom:20px;
}

/* INPUT */
.input-box{
    display:flex;
    align-items:center;
    background:#050807;
    border:1px solid #00ff9c22;
    border-radius:10px;
    padding:10px;
    margin:10px 0;
}

.input-box i{
    margin-right:10px;
    color:#00ff9c;
}

.input-box input{
    border:none;
    outline:none;
    background:transparent;
    color:white;
    width:100%;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#00ff9c;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#00cc7a;
}

/* LINK */
a{
    color:#00ff9c;
    text-decoration:none;
}

.footer{
    margin-top:15px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">⚡ ZeroFis</div>
<div class="subtitle">Create your account</div>

<form method="POST">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Signup</button>

</form>

<div class="footer">
Already have an account? <a href="/login">Login</a>
</div>

</div>

</body>
</html>
