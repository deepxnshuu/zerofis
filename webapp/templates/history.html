<!DOCTYPE html>
<html>
<head>
<title>ZeroFis - History</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#040706;
    color:#eafff7;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:#0b0f0d;
    border-bottom:1px solid #00ff9c22;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#00ff9c;
}

.nav-links a{
    margin:0 15px;
    text-decoration:none;
    color:#c6fff1;
}

.nav-links a:hover{
    color:#00ff9c;
}

.profile{
    display:flex;
    gap:12px;
    align-items:center;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:30px;
    background:#0b0f0d;
    border-radius:16px;
    box-shadow:0 0 40px #00ff9c11;
}

/* TITLE */
h2{
    text-align:center;
    color:#00ff9c;
}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:12px;
    color:#00ff9c;
    border-bottom:1px solid #00ff9c33;
}

td{
    padding:12px;
    border-bottom:1px solid #00ff9c22;
}

/* ROW HOVER */
tr:hover{
    background:#00ff9c08;
}

/* URL FIX */
.url{
    max-width:500px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.url:hover{
    white-space:normal;
    word-break:break-all;
}

/* RESULT COLORS */
.safe{
    color:#00ff9c;
    font-weight:500;
}

.threat{
    color:#ff4d4d;
    font-weight:500;
}

/* RISK BADGE */
.risk{
    background:#00ff9c22;
    padding:4px 10px;
    border-radius:6px;
    display:inline-block;
}

</style>
</head>

<body>

<nav>
<div class="logo">⚡ ZeroFis</div>

<div class="nav-links">
<a href="/"><i class="fa fa-search"></i> Scan</a>
<a href="/history"><i class="fa fa-clock"></i> History</a>
<a href="/stats"><i class="fa fa-chart-line"></i> Stats</a>
<a href="/profile"><i class="fa fa-user"></i> Profile</a>
</div>

<div class="profile">
<span>{{ session['user'] }}</span>
<a href="/logout" style="color:#ff4d4d;">Logout</a>
</div>
</nav>

<div class="container">

<h2>Scan History</h2>
<p style="text-align:center; color:#aaa;">Hover URL to expand</p>

<table>

<tr>
<th>URL</th>
<th>Result</th>
<th>Risk</th>
</tr>

{% for s in scans %}
<tr>

<td class="url" title="{{s.url}}">
<i class="fa fa-link"></i> {{ s.url }}
</td>

<td class="{{ 'safe' if s.result=='Safe' else 'threat' }}">
{{ s.result }}
</td>

<td>
<span class="risk">{{ s.risk_score }}/100</span>
</td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
