<!DOCTYPE html>
<html>
<head>

<title>PhishGuard</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>PhishGuard</h1>
<h3>Phishing URL Detection System</h3>

<form action="/predict" method="POST">

<input type="text" name="url" placeholder="Enter Website URL" required>

<button type="submit">Scan Website</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
